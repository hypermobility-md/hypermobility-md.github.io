backend:
  name: github
  repo: hypermobility-md/hypermobility-md.github.io
  branch: master
  base_url: https://sveltia-cms-auth.hypermobility-md.workers.dev
  auth_endpoint: /auth

media_folder: "src/Guests"
public_folder: "/Guests"

# Restrict image picker to local repo assets + Enter URL only.
# Disables Sveltia's built-in stock photo providers (Unsplash, Pexels, Pixabay).
media_libraries:
  stock_assets:
    providers: []

collections:
  - name: "episodes"
    label: "Podcast Episodes"
    folder: "src/episodes"
    create: true
    slug: "{{fields.num | default(fields.title | slug)}}"
    sortable_fields: ["num", "date", "title"]
    search_fields: ["title", "description", "guests"]
    view_filters:
      - { label: "Bonus / Unnumbered", field: "bonus", pattern: true }
      - { label: "Missing transcript", field: "body", pattern: "^$" }
      - { label: "Missing description", field: "description", pattern: "^$" }
    view_groups:
      - label: Year
        field: date
        pattern: \d{4}
    fields:
      - { label: "Bonus / Unnumbered Episode", name: "bonus", widget: "boolean", default: false, required: false, hint: "Toggle on for bonus or special episodes. Skips episode-number auto-assignment and uses the title as the URL slug." }
      - { label: "Episode Number", name: "num", widget: "number", value_type: "int", required: false, hint: "Leave blank to auto-assign the next number. Ignored when Bonus is on." }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Duration", name: "duration", widget: "string", required: false, hint: "e.g. 1h 7m" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options:
          - "EDS"
          - "POTS"
          - "MCAS"
          - "Pain"
          - "Nutrition"
          - "Mental Health"
          - "Exercise"
          - "Diagnosis"
          - "Treatment"
          - "Neurology"
          - "Genetics"
          - "Research"
          - "Surgery"
          - "Hypermobility"
      - { label: "Audio URL", name: "audioUrl", widget: "string", required: false, hint: "Direct MP3 link for the embedded player (e.g. https://traffic.libsyn.com/...mp3)" }
      - { label: "Video URL", name: "videoUrl", widget: "string", required: false, hint: "Full YouTube URL of the episode (e.g. https://www.youtube.com/watch?v=...)" }
      - label: "YouTube Snippets/Shorts"
        name: "snippets"
        widget: "list"
        required: false
        hint: "Optional. Paste one short/snippet YouTube URL per item — they appear under the episode."
      - label: "Guests"
        name: "guests"
        widget: "list"
        required: false
        hint: "Full names, one per item. Used to look up guest photos and link to guest profiles."
      - label: "Co-hosts"
        name: "cohosts"
        widget: "list"
        required: false
        hint: "Recurring co-hosts on this episode (e.g. Aron, Dacre Knight). Counts toward speaker detection but isn't displayed as a guest."
      - label: "Guest Photo"
        name: "guestImage"
        widget: "image"
        required: false
        media_folder: "/src/Guests"
        public_folder: "/Guests"
        choose_url: true
        hint: "Pick from the Guests library or upload a new photo. Name the file to match the guest — e.g. Jane-Doe.jpg for 'Jane Doe' — so it auto-attaches to the right guest. If the filename doesn't match anyone in Guests above, it falls back to the first guest. The photo also propagates to any future episode featuring that guest. (Doesn't auto-create a Guest Profile — add one separately in 'Guest Profiles' for the full bio/social card.)"
      - label: "Guest Photo Paths"
        name: "guestImages"
        widget: "list"
        required: false
        hint: "Auto-filled on save from the Guests list — you don't need to edit this manually."
      - { label: "Transcript", name: "body", widget: "markdown", required: false, hint: "Full episode transcript — paste the text here" }
      - label: "Advanced Settings"
        name: "seoOverrides"
        widget: "object"
        collapsed: true
        required: false
        hint: "Rarely edited. Social-sharing overrides and speaker-detection overrides for transcript generation."
        fields:
          - { label: "Social Title", name: "ogTitle", widget: "string", required: false, hint: "Custom title for social sharing (defaults to episode title)" }
          - { label: "Social Description", name: "ogDescription", widget: "text", required: false, hint: "Custom description for social sharing (defaults to episode description)" }
          - { label: "Social Image", name: "ogImage", widget: "image", required: false, hint: "Custom social sharing image, 1200x630px recommended (defaults to YouTube thumbnail)" }
          - { label: "Speakers Expected (override)", name: "speakersExpected", widget: "number", value_type: "int", required: false, hint: "Optional. Override the auto-computed speaker count for unusual episodes (e.g. uncredited panelist). Leave empty for default: 1 host + cohosts + guests." }

  - name: "guest-profiles"
    label: "Guest Profiles"
    folder: "src/guest-profiles"
    create: true
    extension: "json"
    format: "json"
    slug: "{{fields.key}}"
    identifier_field: "name"
    summary: "{{fields.name | default(fields.key)}}"
    sortable_fields: ["name", "key", "affiliation"]
    search_fields: ["name", "key", "bio", "credentials", "affiliation"]
    view_filters:
      - { label: "Missing photo", field: "image", pattern: "^$" }
      - { label: "Missing bio", field: "bio", pattern: "^$" }
      - { label: "Missing affiliation", field: "affiliation", pattern: "^$" }
      - { label: "Missing display name", field: "name", pattern: "^$" }
    fields:
      - { label: "Guest Key", name: "key", widget: "string", hint: "Lookup key — the name with no titles or credentials, e.g. 'alexis cutchins'. Case and spacing don't matter; this is only used internally to match the guest across episodes." }
      - { label: "Preferred Display Name", name: "name", widget: "string", required: false, hint: "How the guest's name appears on their profile page and episode cards, e.g. 'Dr. Alexis Cutchins'. Leave blank to fall back to whatever name was entered in an episode's Guests list." }
      - { label: "Bio", name: "bio", widget: "text", required: false }
      - { label: "Credentials", name: "credentials", widget: "string", required: false, hint: "e.g. MD, PhD, DPT" }
      - { label: "Affiliation", name: "affiliation", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false, hint: "https://yourwebsite.com" }
      - { label: "Website 2", name: "website2", widget: "string", required: false, hint: "https://secondsite.com" }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false, hint: "https://linkedin.com/in/yourprofile" }
      - { label: "Twitter / X", name: "twitter", widget: "string", required: false, hint: "https://twitter.com/yourhandle" }
      - { label: "Substack", name: "substack", widget: "string", required: false, hint: "https://yourname.substack.com" }
      - { label: "Instagram", name: "instagram", widget: "string", required: false, hint: "https://instagram.com/yourhandle" }
      - { label: "Facebook", name: "facebook", widget: "string", required: false, hint: "https://facebook.com/yourpage" }
      - { label: "YouTube", name: "youtube", widget: "string", required: false, hint: "https://youtube.com/@yourchannel" }
      - { label: "TikTok", name: "tiktok", widget: "string", required: false, hint: "https://tiktok.com/@yourhandle" }
      - { label: "Wikipedia", name: "wikipedia", widget: "string", required: false, hint: "https://en.wikipedia.org/wiki/Your_Name" }
      - label: "Photo"
        name: "image"
        widget: "image"
        required: false
        media_folder: "/src/Guests"
        public_folder: "/Guests"
        choose_url: true
        hint: "Pick from the Guests library or upload a new photo. Saved to /Guests/."

  - name: "appearances"
    label: "Guest Appearances"
    folder: "src/appearances"
    create: true
    slug: "{{fields.showName | slugify}}"
    identifier_field: "showName"
    summary: "{{fields.showName}} — {{fields.episodeTitle}}"
    sortable_fields: ["date", "showName"]
    search_fields: ["showName", "episodeTitle", "description"]
    view_filters:
      - { label: "Featured", field: "featured", pattern: true }
      - { label: "Missing image", field: "imageUrl", pattern: "^$" }
      - { label: "Missing description", field: "description", pattern: "^$" }
    view_groups:
      - label: Year
        field: date
        pattern: \d{4}
    fields:
      - { label: "Show Name", name: "showName", widget: "string", hint: "Name of the podcast or show" }
      - { label: "Episode Title", name: "episodeTitle", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false, hint: "Appearance date (for sorting)" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Episode URL", name: "url", widget: "string", required: false, hint: "Link to the episode page on the show's own website. If the show only lives on Apple Podcasts, leave this blank and use the field below." }
      - { label: "Apple Podcasts URL", name: "applePodcastsUrl", widget: "string", required: false, hint: "Apple Podcasts link for this episode. Renders an Apple-styled button." }
      - label: "Show Image"
        name: "imageUrl"
        widget: "image"
        required: false
        media_folder: "/src/assets/appearances"
        public_folder: "/assets/appearances"
        choose_url: true
        hint: "Show logo or cover art. Click to browse uploaded images (searchable) or upload a new one. Saved to /assets/appearances/."
      - label: "Type"
        name: "type"
        widget: "select"
        default: "listen"
        hint: "Controls the card button label — 'Listen' for audio podcasts, 'Watch' for video-first shows."
        options:
          - { label: "Listen", value: "listen" }
          - { label: "Watch", value: "watch" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "Toggle on to pin this appearance to the Featured row at the top of the Guest Appearances page." }
      - { label: "Audio URL", name: "audioUrl", widget: "string", required: false, hint: "Direct MP3 link. If present, the appearance detail page shows an embedded audio player." }
      - { label: "Video URL", name: "videoUrl", widget: "string", required: false, hint: "YouTube URL to embed on the appearance detail page." }
      - { label: "YouTube URL", name: "youtubeUrl", widget: "string", required: false, hint: "Public YouTube link for the 'Watch on YouTube' button. Only needed if it differs from Video URL." }

  - name: "faq-items"
    label: "FAQ Items"
    folder: "src/faq-items"
    create: true
    slug: "{{fields.question | slugify}}"
    identifier_field: "question"
    summary: "[{{fields.category}} · {{fields.order}}] {{fields.question}}"
    sortable_fields: ["category", "order", "question"]
    search_fields: ["question", "body"]
    view_groups:
      - label: Category
        field: category
    fields:
      - { label: "Question", name: "question", widget: "string", hint: "The question as shown on the accordion (e.g. \"What is EduCoaching?\")." }
      - label: "Category"
        name: "category"
        widget: "select"
        hint: "Which section of the FAQ page this question appears in."
        options:
          - { label: "Medical & Coaching Services (general)", value: "general" }
          - { label: "Medical Services", value: "medical" }
          - { label: "Coaching Services", value: "coaching" }
          - { label: "Professional Mentorship", value: "mentorship" }
          - { label: "Medico-Legal Services", value: "medico-legal" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 99, hint: "Lower numbers appear higher in the section. Use 1, 2, 3, … to control position; ties fall back to alphabetical." }
      - { label: "Answer", name: "body", widget: "markdown", hint: "The answer body. Supports markdown: **bold**, *italic*, bullet lists, [links](url), etc." }
