backend:
  name: github
  repo: hypermobility-md/hypermobility-md.github.io
  branch: master
  base_url: https://sveltia-cms-auth.hypermobility-md.workers.dev
  auth_endpoint: /auth

media_folder: "src/Guests"
public_folder: "/Guests"

collections:
  - name: "episodes"
    label: "Podcast Episodes"
    folder: "src/episodes"
    create: true
    slug: "{{fields.num}}"
    sortable_fields: ["num", "date", "title"]
    view_groups:
      - label: Year
        field: date
        pattern: \d{4}
    fields:
      - { label: "Episode Number", name: "num", widget: "number", value_type: "int", required: false }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Duration", name: "duration", widget: "string", required: false, hint: "e.g. 1h 7m" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options:
          - "EDS"
          - "POTS"
          - "MCAS"
          - "Pain"
          - "Nutrition"
          - "Mental Health"
          - "Exercise"
          - "Diagnosis"
          - "Treatment"
          - "Neurology"
          - "Genetics"
          - "Research"
          - "Surgery"
          - "Hypermobility"
      - { label: "Audio URL", name: "audioUrl", widget: "string", required: false }
      - { label: "Video URL", name: "videoUrl", widget: "string", required: false, hint: "YouTube URL" }
      - label: "YouTube Snippets/Shorts"
        name: "snippets"
        widget: "list"
        required: false
      - label: "Guests"
        name: "guests"
        widget: "list"
        required: false
      - label: "Guest Photo"
        name: "guestImage"
        widget: "image"
        required: false
        hint: "Upload a photo for the guest (saved to /Guests/)"
      - label: "Guest Photo Paths"
        name: "guestImages"
        widget: "list"
        required: false
        hint: "Auto-filled paths (e.g. Guests/Name.jpg)"
      - { label: "Transcript", name: "body", widget: "markdown", required: false, hint: "Full episode transcript — paste the text here" }

  - name: "guest-profiles"
    label: "Guest Profiles"
    folder: "src/guest-profiles"
    create: true
    extension: "json"
    format: "json"
    slug: "{{fields.key}}"
    identifier_field: "key"
    summary: "{{fields.key}}"
    sortable_fields: ["key", "affiliation"]
    fields:
      - { label: "Guest Key", name: "key", widget: "string", hint: "Lowercase name without titles/credentials, e.g. 'dacre knight'" }
      - { label: "Bio", name: "bio", widget: "text", required: false }
      - { label: "Credentials", name: "credentials", widget: "string", required: false, hint: "e.g. MD, PhD, DPT" }
      - { label: "Affiliation", name: "affiliation", widget: "string", required: false }
      - label: "Links"
        name: "links"
        widget: "list"
        required: false
        fields:
          - { label: "URL", name: "url", widget: "string" }
          - { label: "Label", name: "label", widget: "string", required: false, hint: "e.g. Website, LinkedIn, Instagram" }
      - { label: "Photo", name: "image", widget: "image", required: false, hint: "Upload or select a guest photo" }
