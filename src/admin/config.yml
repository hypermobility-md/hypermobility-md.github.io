backend:
  name: github
  repo: hypermobility-md/hypermobility-md.github.io
  branch: master
  base_url: https://sveltia-cms-auth.hypermobility-md.workers.dev
  auth_endpoint: /auth

media_folder: "src/Guests"
public_folder: "/Guests"

# Restrict image picker to local repo assets + Enter URL only.
# Disables Sveltia's built-in stock photo providers (Unsplash, Pexels, Pixabay).
media_libraries:
  stock_assets:
    providers: []

collections:
  - name: "episodes"
    label: "Podcast Episodes"
    folder: "src/episodes"
    create: true
    slug: "{{fields.num | default(fields.title | slug)}}"
    sortable_fields: ["num", "date", "title"]
    search_fields: ["title", "description", "guests"]
    view_filters:
      - { label: "Bonus / Unnumbered", field: "bonus", pattern: true }
      - { label: "Missing transcript", field: "body", pattern: "^$" }
      - { label: "Missing description", field: "description", pattern: "^$" }
    view_groups:
      - label: Year
        field: date
        pattern: \d{4}
    fields:
      - { label: "Bonus / Unnumbered Episode", name: "bonus", widget: "boolean", default: false, required: false, hint: "Toggle on for bonus or special episodes. This skips the automatic episode numbering and uses the title as the URL." }
      - { label: "Episode Number", name: "num", widget: "number", value_type: "int", required: false, hint: "Leave blank to auto-assign the next number. Ignored for bonus episodes." }
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Duration", name: "duration", widget: "string", required: false, hint: "e.g. 1h 7m" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - label: "Tags"
        name: "tags"
        widget: "select"
        multiple: true
        required: false
        options:
          - "Patient Advocacy"
          - "Mental Health"
          - "MCAS"
          - "Diagnosis"
          - "Pain"
          - "Dance & Performing Arts"
          - "Injury Prevention"
          - "Physical Therapy"
          - "POTS"
          - "Dysautonomia"
          - "Research"
          - "Nutrition"
          - "Exercise"
          - "Integrative Medicine"
          - "Neurology"
          - "Surgery"
          - "Inflammation"
          - "Craniocervical Instability"
          - "GI Issues"
          - "Pelvic Health"
          - "Neurodivergence"
          - "Women's Health"
          - "Fatigue"
          - "Anesthesia"
          - "Sleep"
          - "Brain Fog"
          - "Genetics"
          - "Eating Disorders"
          - "Headaches"
          - "Long COVID"
          - "Chiari Malformation"
          - "ME/CFS"
          - "TMJ/TMD"
          - "MALS"
          - "Fibromyalgia"
      - { label: "Audio URL", name: "audioUrl", widget: "string", required: false, hint: "Direct MP3 link for the embedded player (e.g. https://p.podderapp.com/...mp3)" }
      - { label: "Video URL", name: "videoUrl", widget: "string", required: false, hint: "Full YouTube URL of the episode (e.g. https://www.youtube.com/watch?v=...)" }
      - label: "YouTube Snippets/Shorts"
        name: "snippets"
        widget: "list"
        required: false
        hint: "Optional. Paste one YouTube short URL per line. They appear under the embedded video."
      - label: "Guests"
        name: "guests"
        widget: "list"
        required: false
        hint: "Full guest names, one per item. Used to look up guest photos and link to guest profiles. Don't include honorifics (Dr., ...)."
      - label: "Co-hosts"
        name: "cohosts"
        widget: "list"
        required: false
        hint: "Recurring co-hosts on this episode (e.g. Aron, Dacre Knight). Counts toward speaker detection but isn't displayed as a guest."
      - label: "Guest Photo"
        name: "guestImage"
        widget: "image"
        required: false
        media_folder: "/src/Guests"
        public_folder: "/Guests"
        choose_url: true
        hint: "Pick from the Guests library or upload a new photo. Name the file to match the guest  e.g. Jane-Doe.jpg for 'Jane Doe'. The photo also propagates to any future episode featuring that guest."
      - label: "Guest Photo Paths"
        name: "guestImages"
        widget: "list"
        required: false
        hint: "Auto-filled on save from the Guests list. You don't need to edit this manually"
      - label: "Advanced Settings"
        name: "seoOverrides"
        widget: "object"
        collapsed: false
        required: false
        hint: "Optional SEO and URL overrides. The metadata and URL are automatically generated from the other information, but you can override these fields."
        fields:
          - { label: "SEO Title", name: "ogTitle", widget: "string", required: false, hint: "Overrides both the browser-tab title and the social-share (og:title). The defaults is the Title field above." }
          - { label: "SEO Description", name: "ogDescription", widget: "text", required: false, hint: "Overrides BOTH the meta description and the social-share description. Defaults to: the Description field above (first ~200 chars)." }
          - { label: "Social Image", name: "ogImage", widget: "image", required: false, hint: "Custom social sharing image, 1200x630px recommended." }
          - { label: "URL slug (advanced)", name: "slug", widget: "string", required: false, hint: "Overrides the path after /episodes/. Defaults to: '{episode-number}-{title-slug}', e.g. '196-too-flexible-to-fix-orthopedic-surgery'. Note: Changing this on a published episode auto-generates a redirect from the original URL, but external links and SEO rank with the original URL" }
          - { label: "Speakers Expected (override)", name: "speakersExpected", widget: "number", value_type: "int", required: false, hint: "Optional. Override the auto-computed speaker count for unusual episodes (e.g. uncredited panelist). Leave empty for default: 1 host + cohosts + guests." }
      - { label: "Transcript", name: "body", widget: "markdown", required: false, hint: "Full episode transcript" }

  - name: "guest-profiles"
    label: "Guest Profiles"
    folder: "src/guest-profiles"
    create: true
    extension: "json"
    format: "json"
    slug: "{{fields.key}}"
    identifier_field: "key"
    summary: "{{fields.key}}"
    sortable_fields:
      fields: ["lastEpisode", "key", "name", "affiliation"]
      default: { field: "lastEpisode", direction: "descending" }
    search_fields: ["name", "key", "bio", "credentials", "affiliation"]
    view_filters:
      - { label: "Missing bio", field: "bio", pattern: "^$" }
      - { label: "Missing photo", field: "image", pattern: "^$" }
      - { label: "Missing affiliation", field: "affiliation", pattern: "^$" }
      - { label: "Missing display name", field: "name", pattern: "^$" }
    fields:
      - { label: "Guest Key", name: "key", widget: "string", hint: "Name with no titles or credentials, e.g. 'alexis cutchins'. Case and spacing don't matter; this is used internally to match the guest across episodes, and is what's shown in this list." }
      - { label: "Preferred Display Name", name: "name", widget: "string", required: false, hint: "How the guest's name appears on their profile page and episode cards, e.g. 'Dr. Alexis Cutchins'. Leave blank to fall back to whatever name was entered in an episode's Guests list." }
      - { label: "Bio", name: "bio", widget: "text", required: false }
      - { label: "Credentials", name: "credentials", widget: "string", required: false, hint: "e.g. MD, PhD, DPT" }
      - { label: "Affiliation", name: "affiliation", widget: "string", required: false }
      - { label: "Website", name: "website", widget: "string", required: false, hint: "https://yourwebsite.com" }
      - { label: "Website 2", name: "website2", widget: "string", required: false, hint: "https://secondsite.com" }
      - { label: "LinkedIn", name: "linkedin", widget: "string", required: false, hint: "https://linkedin.com/in/yourprofile" }
      - { label: "Twitter / X", name: "twitter", widget: "string", required: false, hint: "https://twitter.com/yourhandle" }
      - { label: "Substack", name: "substack", widget: "string", required: false, hint: "https://yourname.substack.com" }
      - { label: "Instagram", name: "instagram", widget: "string", required: false, hint: "https://instagram.com/yourhandle" }
      - { label: "Facebook", name: "facebook", widget: "string", required: false, hint: "https://facebook.com/yourpage" }
      - { label: "YouTube", name: "youtube", widget: "string", required: false, hint: "https://youtube.com/@yourchannel" }
      - { label: "TikTok", name: "tiktok", widget: "string", required: false, hint: "https://tiktok.com/@yourhandle" }
      - { label: "Wikipedia", name: "wikipedia", widget: "string", required: false, hint: "https://en.wikipedia.org/wiki/Your_Name" }
      - label: "Photo"
        name: "image"
        widget: "image"
        required: false
        media_folder: "/src/Guests"
        public_folder: "/Guests"
        choose_url: true
        hint: "Pick from the Guests library or upload a new photo. Saved to /Guests/."
      - { label: "Last Episode Date", name: "lastEpisode", widget: "string", required: false, hint: "Auto-filled from the guest's most recent episode (YYYY-MM-DD). Used to sort this list by recency — you don't normally edit this." }

  - name: "appearances"
    label: "Guest Appearances"
    folder: "src/appearances"
    create: true
    slug: "{{fields.showName | slugify}}"
    identifier_field: "showName"
    summary: "{{fields.showName}} — {{fields.episodeTitle}}"
    sortable_fields: ["date", "showName", "featuredOrder"]
    search_fields: ["showName", "episodeTitle", "description"]
    view_filters:
      - { label: "Featured", field: "featured", pattern: true }
      - { label: "Missing image", field: "imageUrl", pattern: "^$" }
      - { label: "Missing description", field: "description", pattern: "^$" }
    view_groups:
      - label: Year
        field: date
        pattern: \d{4}
    fields:
      - { label: "Show Name", name: "showName", widget: "string", hint: "Name of the podcast" }
      - { label: "Episode Title", name: "episodeTitle", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false, required: false, hint: "Appearance date (for sorting)" }
      - { label: "Description", name: "description", widget: "text", required: false }
      - { label: "Episode URL", name: "url", widget: "string", required: false, hint: "Link to the episode page on the show's own website. If the show only lives on Apple Podcasts, leave this blank and use the field below." }
      - { label: "Apple Podcasts URL", name: "applePodcastsUrl", widget: "string", required: false, hint: "Apple Podcasts link for this episode. Renders an Apple-styled button." }
      - label: "Show Image"
        name: "imageUrl"
        widget: "image"
        required: false
        media_folder: "/src/assets/appearances"
        public_folder: "/assets/appearances"
        choose_url: true
        hint: "Show logo or cover art. Click to browse uploaded images or upload a new one. Saved to /assets/appearances/."
      - label: "Type"
        name: "type"
        widget: "select"
        default: "listen"
        hint: "Controls the card button label. 'Listen' for audio podcasts or 'Watch' for video-first shows."
        options:
          - { label: "Listen", value: "listen" }
          - { label: "Watch", value: "watch" }
      - { label: "Featured", name: "featured", widget: "boolean", default: false, hint: "Toggle on to pin this appearance to the Featured row at the top of the Guest Appearances page." }
      - { label: "Featured Order", name: "featuredOrder", widget: "number", value_type: "int", required: false, hint: "Only used when Featured is on. Lower numbers appear first in the Featured row (1, 2, 3, …). Ties or blank entries fall back to most-recent date." }
      - { label: "Audio URL", name: "audioUrl", widget: "string", required: false, hint: "Direct MP3 link. If present, the appearance detail page shows an embedded audio player." }
      - { label: "Video URL", name: "videoUrl", widget: "string", required: false, hint: "YouTube URL to embed on page" }
      - { label: "YouTube URL", name: "youtubeUrl", widget: "string", required: false, hint: "Public YouTube link for the 'Watch on YouTube' button. Only needed if it differs from Video URL." }
      - label: "Advanced Settings"
        name: "seoOverrides"
        widget: "object"
        collapsed: true
        required: false
        hint: "Optional SEO overrides. Leave each field blank to use the default derived from the main fields."
        fields:
          - { label: "SEO Title", name: "ogTitle", widget: "string", required: false, hint: "Overrides BOTH the browser-tab title and the social-share (og:title). Defaults to: 'Show Name — Episode Title'." }
          - { label: "SEO Description", name: "ogDescription", widget: "text", required: false, hint: "Overrides BOTH the meta description and the social-share description. Defaults to the Description field above." }
          - { label: "Social Image", name: "ogImage", widget: "image", required: false, hint: "Custom 1200x630 social share image. Defaults to: the Show Image above." }

  - name: "faq-items"
    label: "FAQ Items"
    folder: "src/faq-items"
    create: true
    slug: "{{fields.question | slugify}}"
    identifier_field: "question"
    summary: "{{question}}  ·  {{category}} #{{order}}"
    sortable_fields: ["category", "order", "question"]
    search_fields: ["question", "body"]
    view_groups:
      - label: Category
        field: category
    fields:
      - { label: "Question", name: "question", widget: "string", hint: "The question as shown on the accordion (\"What is EduCoaching?\")." }
      - label: "Category"
        name: "category"
        widget: "select"
        hint: "Which section of the FAQ page this question appears in. Items group by category in the CMS list."
        options:
          - { label: "Medical & Coaching Services", value: "general" }
          - { label: "Medical Services", value: "medical" }
          - { label: "Coaching Services", value: "coaching" }
          - { label: "Professional Mentorship", value: "mentorship" }
          - { label: "Medico-Legal Services", value: "medico-legal" }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 99, hint: "Lower numbers appear higher in the section. Use 1, 2, 3, … to control position. Ties fall back to alphabetical." }
      - { label: "Answer", name: "body", widget: "markdown", hint: "The answer body. Supports markdown: **bold**, *italic*, bullet lists, [links](url), etc." }

  - name: "hypermobility-questions"
    label: "Hypermobility Questions"
    folder: "src/hypermobility-questions"
    create: true
    slug: "{{fields.title | slugify}}"
    identifier_field: "title"
    summary: "{{title}}  ·  #{{order}}"
    sortable_fields: ["order", "title"]
    search_fields: ["title", "description", "body"]
    fields:
      - { label: "Question", name: "title", widget: "string", hint: "The question, e.g. \"Is EDS Really 'Benign'?\". Shown on the FAQ page and as the page heading." }
      - { label: "Answer", name: "body", widget: "markdown", hint: "Full answer / article body. Supports markdown: headings, **bold**, *italic*, lists, [links](url), etc." }
      - label: "Top-of-page embed"
        name: "embed"
        widget: "object"
        collapsed: true
        required: false
        hint: "Optional. Pick a media type to show above the article — only that type's fields appear. Leave as 'None' to omit. Use 'External link' to link out (e.g. an original blog post)."
        types:
          - { name: "none", label: "None" }
          - name: "image"
            label: "Image"
            fields:
              - { label: "Image", name: "image", widget: "image", required: false, media_folder: "/src/assets/hypermobility-questions", public_folder: "/assets/hypermobility-questions", choose_url: true }
              - { label: "Image alt text", name: "imageAlt", widget: "string", required: false, hint: "Brief description for screen readers." }
              - { label: "Image caption", name: "imageCaption", widget: "string", required: false, hint: "Optional caption shown below the image." }
          - name: "video"
            label: "YouTube video"
            fields:
              - { label: "YouTube URL", name: "videoUrl", widget: "string", required: false, hint: "Paste the full YouTube URL." }
          - name: "link"
            label: "External link"
            fields:
              - { label: "Link URL", name: "linkUrl", widget: "string", required: false }
              - { label: "Link label", name: "linkLabel", widget: "string", required: false, hint: "Text shown on the link button (defaults to the URL)." }
      - { label: "Order", name: "order", widget: "number", value_type: "int", default: 99, hint: "Lower numbers appear higher in the Questions about Hypermobility list. Ties fall back to title." }
      - { label: "Short description (SEO)", name: "description", widget: "text", required: false, hint: "1-2 sentence summary. Used for the meta description for SEO." }
      - label: "Advanced Settings"
        name: "seoOverrides"
        widget: "object"
        collapsed: true
        required: false
        hint: "Optional SEO overrides. Leave each field blank to use the default derived from the article's main fields."
        fields:
          - { label: "SEO Title", name: "ogTitle", widget: "string", required: false, hint: "Overrides BOTH the browser-tab title and the social-share (og:title). Defaults to the Title field above." }
          - { label: "Social Image", name: "ogImage", widget: "image", required: false, media_folder: "/src/assets/hypermobility-questions", public_folder: "/assets/hypermobility-questions", choose_url: true, hint: "Custom 1200x630 social-share image. Defaults to the site's default share image." }
