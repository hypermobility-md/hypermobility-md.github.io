<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager — Hypermobility MD</title>
  <style>
    /* Pre-save dialog */
    .hmd-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
    }
    .hmd-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e1e2e;
      color: #e0e0e0;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      padding: 28px;
      z-index: 10000;
      max-width: 500px;
      width: 92%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-height: 80vh;
      overflow-y: auto;
    }
    .hmd-dialog h3 {
      margin: 0 0 6px;
      font-size: 16px;
      color: #fff;
    }
    .hmd-dialog-subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }
    .hmd-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b5ce7;
      margin: 18px 0 8px;
    }
    .hmd-section-label:first-of-type { margin-top: 0; }
    .hmd-info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 8px;
      font-size: 13px;
      background: #ffffff08;
      border: 1px solid #ffffff10;
    }
    .hmd-info-row img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #6b5ce7;
      flex-shrink: 0;
    }
    .hmd-info-row.found { background: #1b5e2018; border-color: #2e7d3230; }
    .hmd-info-row.missing { background: #b7131318; border-color: #c6282830; }
    .hmd-info-row .status { font-size: 12px; color: #888; }
    .hmd-info-row .status.ok { color: #81c784; }
    .hmd-info-row .status.warn { color: #ef9a9a; }
    .hmd-no-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #c62828;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      flex-shrink: 0;
    }
    .hmd-path-item {
      font-size: 12px;
      color: #aaa;
      padding: 4px 12px;
      background: #ffffff06;
      border-radius: 6px;
      margin: 3px 0;
      font-family: 'SF Mono', Monaco, monospace;
      word-break: break-all;
    }
    .hmd-dialog-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      justify-content: flex-end;
    }
    .hmd-btn {
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .hmd-btn-save {
      background: #6b5ce7;
      color: white;
    }
    .hmd-btn-save:hover { background: #7c6ef0; }
    .hmd-btn-save.has-warnings {
      background: #e65100;
    }
    .hmd-btn-save.has-warnings:hover { background: #f57c00; }
    .hmd-btn-cancel {
      background: #333;
      color: #ccc;
      border: 1px solid #555;
    }
    .hmd-btn-cancel:hover { background: #444; }
    .hmd-warning {
      background: #e6510018;
      border: 1px solid #e6510040;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 14px;
      font-size: 12px;
      color: #ffab91;
    }
  </style>
</head>
<body>
  <script>
    // =========================================================
    //  Hypermobility MD — CMS Enhancements for Sveltia CMS
    //  - Pre-save dialog with guest photo info & auto-fill
    //  - Floating toolbar with "Next Ep #" for quick fill
    //  - preSave hook for auto-increment, validation, guestImages
    // =========================================================

    let guestLookup = {};
    let episodeNums = [];
    Promise.all([
      fetch('/cms-data/guest-lookup.json').then(r => r.ok ? r.json() : {}).catch(() => ({})),
      fetch('/cms-data/episode-nums.json').then(r => r.ok ? r.json() : []).catch(() => [])
    ]).then(([guests, nums]) => {
      guestLookup = guests;
      episodeNums = nums.filter(n => n !== null);
    });

    function getNextEpisodeNum() {
      if (episodeNums.length === 0) return 1;
      return Math.max(...episodeNums) + 1;
    }

    function stripCredentials(name) {
      let n = name, prev;
      do {
        prev = n;
        n = n.replace(/[,\s]+(M\.?D\.?|Ph\.?D\.?|D\.?P\.?T\.?|D\.?O\.?|P\.?A\.?-?C?|R\.?D\.?N\.?|O\.?T\.?|P\.?T\.?|J\.?D\.?|LICSW|NCPT|ATC|MS|MA|MPT|DMSC|MRCPsych|DDS)\.?\s*$/i, '');
      } while (n !== prev);
      return n.replace(/[,.\s]+$/, '').trim();
    }

    function normalizeGuestKey(name) {
      let n = name.replace(/^(Dr\.?|Prof\.?|Professor)\s+/i, '');
      n = stripCredentials(n);
      return n.toLowerCase().replace(/\s+/g, ' ');
    }

    // ---- Pre-save dialog ----
    // Shows detailed info about what will be saved, with guest photo status
    function showPreSaveDialog(info) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'hmd-overlay';
        const dialog = document.createElement('div');
        dialog.className = 'hmd-dialog';

        let html = '<h3>Episode Pre-Save Review</h3>';
        html += '<div class="hmd-dialog-subtitle">Review the information below before saving.</div>';

        // Episode number
        html += '<div class="hmd-section-label">Episode Number</div>';
        html += '<div class="hmd-info-row"><span>';
        if (info.numAutoFilled) {
          html += '<strong>#' + info.num + '</strong> <span class="status ok">(auto-assigned)</span>';
        } else {
          html += '<strong>#' + info.num + '</strong>';
        }
        html += '</span></div>';

        // Date
        html += '<div class="hmd-section-label">Date</div>';
        html += '<div class="hmd-info-row"><span>';
        if (info.dateAutoFilled) {
          html += '<strong>' + info.date + '</strong> <span class="status ok">(auto-filled to today)</span>';
        } else {
          html += '<strong>' + info.date + '</strong>';
        }
        html += '</span></div>';

        // Guest photos
        if (info.guests && info.guests.length > 0) {
          html += '<div class="hmd-section-label">Guest Photos</div>';
          for (const g of info.guestResults) {
            if (g.photo) {
              html += '<div class="hmd-info-row found">';
              html += '<img src="' + g.photo + '" alt="">';
              html += '<span><strong>' + g.name + '</strong><br><span class="status ok">Photo found</span></span>';
              html += '</div>';
            } else {
              html += '<div class="hmd-info-row missing">';
              html += '<span class="hmd-no-photo">✕</span>';
              html += '<span><strong>' + g.name + '</strong><br><span class="status warn">No photo on file</span></span>';
              html += '</div>';
            }
          }

          // Guest image paths that will be auto-filled
          if (info.guestImagePaths.length > 0) {
            html += '<div class="hmd-section-label">Guest Photo Paths (auto-filled)</div>';
            for (const p of info.guestImagePaths) {
              html += '<div class="hmd-path-item">' + p + '</div>';
            }
          }
        }

        // Warning about missing photos
        if (info.missingPhotos.length > 0) {
          html += '<div class="hmd-warning">⚠ No photo found for: <strong>' +
            info.missingPhotos.join(', ') + '</strong>. The episode will save without images for these guests.</div>';
        }

        // Action buttons
        const hasWarnings = info.missingPhotos.length > 0;
        html += '<div class="hmd-dialog-actions">';
        html += '<button class="hmd-btn hmd-btn-cancel" id="hmdCancel">Cancel</button>';
        html += '<button class="hmd-btn hmd-btn-save' + (hasWarnings ? ' has-warnings' : '') +
          '" id="hmdSave">' + (hasWarnings ? 'Save Anyway' : 'Save') + '</button>';
        html += '</div>';

        dialog.innerHTML = html;

        function close(result) {
          overlay.remove();
          dialog.remove();
          document.removeEventListener('keydown', escHandler);
          resolve(result);
        }

        function escHandler(e) {
          if (e.key === 'Escape') close(false);
        }

        document.body.appendChild(overlay);
        document.body.appendChild(dialog);
        document.addEventListener('keydown', escHandler);

        dialog.querySelector('#hmdCancel').onclick = () => close(false);
        dialog.querySelector('#hmdSave').onclick = () => close(true);
        overlay.onclick = () => close(false);
      });
    }

    // ---- preSave hook ----
    function registerHooks() {
      if (typeof CMS === 'undefined') {
        setTimeout(registerHooks, 200);
        return;
      }

      CMS.registerEventListener({
        name: 'preSave',
        handler: async ({ entry }) => {
          try {
            const collection = entry.get ? entry.get('collection') : entry.collection;
            if (collection !== 'episodes') return;

            // Read entry data (handle both Immutable.js and plain object)
            let getData, setData;
            if (entry.get && entry.getIn) {
              getData = (field) => {
                const val = entry.getIn(['data', field]);
                return val && val.toJS ? val.toJS() : val;
              };
              setData = (field, value) => {
                entry = entry.setIn(['data', field], value);
              };
            } else {
              getData = (field) => entry.data?.[field];
              setData = (field, value) => { entry.data[field] = value; };
            }

            // Prepare info for the pre-save dialog
            let num = getData('num');
            let numAutoFilled = false;
            if (!num || num === 0) {
              num = getNextEpisodeNum();
              numAutoFilled = true;
            }

            let date = getData('date');
            let dateAutoFilled = false;
            if (!date) {
              date = new Date().toISOString().split('T')[0];
              dateAutoFilled = true;
            }

            const guests = getData('guests') || [];
            const guestResults = [];
            const guestImagePaths = [];
            const missingPhotos = [];

            for (const guest of guests) {
              const key = normalizeGuestKey(guest);
              const photo = guestLookup[key];
              guestResults.push({ name: guest, photo: photo || null });
              if (photo) {
                guestImagePaths.push(photo.replace(/^\//, ''));
              } else {
                missingPhotos.push(guest);
              }
            }

            // Show the pre-save dialog
            const proceed = await showPreSaveDialog({
              num,
              numAutoFilled,
              date,
              dateAutoFilled,
              guests,
              guestResults,
              guestImagePaths,
              missingPhotos
            });

            if (!proceed) return false;

            // Apply changes
            if (numAutoFilled) {
              setData('num', num);
              episodeNums.push(num);
            }

            if (dateAutoFilled) {
              setData('date', date);
            }

            if (guestImagePaths.length > 0) {
              setData('guestImages', guestImagePaths);
            }

            return entry;
          } catch (err) {
            console.error('CMS preSave hook error:', err);
          }
        }
      });
    }

    registerHooks();
  </script>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
