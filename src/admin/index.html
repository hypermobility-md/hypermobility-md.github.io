<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager — Hypermobility MD</title>
  <style>
    /* Floating episode helper toolbar */
    .hmd-toolbar {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 9000;
      display: flex;
      gap: 8px;
      background: #1e1e2e;
      border: 1px solid #444;
      border-radius: 10px;
      padding: 8px 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      transition: opacity 0.2s;
    }
    .hmd-toolbar-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      font-size: 13px;
      font-weight: 600;
      border: 1px solid #6b5ce7;
      background: #6b5ce718;
      color: #a794ff;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .hmd-toolbar-btn:hover { background: #6b5ce730; color: #c4b8ff; }
    .hmd-toolbar-btn.success { border-color: #4caf50; color: #81c784; background: #4caf5018; }
    .hmd-toolbar-label {
      font-size: 11px;
      color: #888;
      font-weight: 500;
      padding-right: 4px;
      align-self: center;
    }

    /* Guest photo check popup */
    .hmd-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
    }
    .hmd-popup {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e1e2e;
      color: #e0e0e0;
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      padding: 24px;
      z-index: 10000;
      max-width: 440px;
      width: 90%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .hmd-popup h3 { margin: 0 0 16px; font-size: 15px; color: #fff; }
    .hmd-popup-close {
      position: absolute;
      top: 10px;
      right: 14px;
      background: none;
      border: none;
      font-size: 22px;
      cursor: pointer;
      color: #888;
      line-height: 1;
    }
    .hmd-popup-close:hover { color: #fff; }
    .hmd-guest-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 8px;
      font-size: 13px;
    }
    .hmd-guest-row img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #6b5ce7;
      flex-shrink: 0;
    }
    .hmd-guest-row.found { background: #1b5e2020; border: 1px solid #2e7d3240; }
    .hmd-guest-row.missing { background: #b7131320; border: 1px solid #c6282840; }
    .hmd-no-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #c62828;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <script>
    // =========================================================
    //  Hypermobility MD — CMS Enhancements for Sveltia CMS
    //  - Floating toolbar with "Next Ep #" and "Check Photos"
    //  - preSave hook for auto-increment, validation, guestImages
    // =========================================================

    let guestLookup = {};
    let episodeNums = [];

    Promise.all([
      fetch('/cms-data/guest-lookup.json').then(r => r.ok ? r.json() : {}).catch(() => ({})),
      fetch('/cms-data/episode-nums.json').then(r => r.ok ? r.json() : []).catch(() => [])
    ]).then(([guests, nums]) => {
      guestLookup = guests;
      episodeNums = nums.filter(n => n !== null);
    });

    function getNextEpisodeNum() {
      if (episodeNums.length === 0) return 1;
      return Math.max(...episodeNums) + 1;
    }

    function stripCredentials(name) {
      let n = name, prev;
      do {
        prev = n;
        n = n.replace(/[,\s]+(M\.?D\.?|Ph\.?D\.?|D\.?P\.?T\.?|D\.?O\.?|P\.?A\.?-?C?|R\.?D\.?N\.?|O\.?T\.?|P\.?T\.?|J\.?D\.?|LICSW|NCPT|ATC|MS|MA|MPT|DMSC|MRCPsych|DDS)\.?\s*$/i, '');
      } while (n !== prev);
      return n.replace(/[,.\s]+$/, '').trim();
    }

    function normalizeGuestKey(name) {
      let n = name.replace(/^(Dr\.?|Prof\.?|Professor)\s+/i, '');
      n = stripCredentials(n);
      return n.toLowerCase().replace(/\s+/g, ' ');
    }

    // ---- DOM helpers to find Sveltia CMS fields by label text ----
    function findFieldByLabel(labelText) {
      // Walk all elements looking for one whose text content matches the label
      const walker = document.createTreeWalker(
        document.body,
        NodeFilter.SHOW_ELEMENT,
        {
          acceptNode(node) {
            // Skip our own toolbar
            if (node.closest('.hmd-toolbar, .hmd-popup, .hmd-overlay')) return NodeFilter.FILTER_REJECT;
            // Check direct text (not nested) for the label
            const directText = Array.from(node.childNodes)
              .filter(n => n.nodeType === Node.TEXT_NODE)
              .map(n => n.textContent.trim())
              .join('');
            if (directText === labelText || directText === labelText + ' *') return NodeFilter.FILTER_ACCEPT;
            return NodeFilter.FILTER_SKIP;
          }
        }
      );
      return walker.nextNode();
    }

    function findInputNear(labelEl, inputType) {
      // Walk up to find the field container, then look for an input
      let container = labelEl;
      for (let i = 0; i < 5; i++) {
        container = container.parentElement;
        if (!container) break;
        const input = container.querySelector(inputType || 'input');
        if (input) return input;
      }
      return null;
    }

    function findAllInputsNear(labelEl) {
      let container = labelEl;
      for (let i = 0; i < 5; i++) {
        container = container.parentElement;
        if (!container) break;
        const inputs = container.querySelectorAll('input');
        if (inputs.length > 0) return inputs;
      }
      return [];
    }

    // ---- Find guest names from the CMS form ----
    function getGuestNamesFromForm() {
      const guests = [];

      // Strategy 1: Find "Guests" label element and get inputs near it
      const labelEl = findFieldByLabel('Guests');
      if (labelEl) {
        const inputs = findAllInputsNear(labelEl);
        inputs.forEach(inp => {
          const val = inp.value.trim();
          if (val && val.length > 2) guests.push(val);
        });
        // If we found the label's section, only return those inputs
        // Filter out values that are clearly not names
        const filtered = guests.filter(v =>
          !v.match(/^\d{4}/) &&          // not a date
          !v.match(/^\d+$/) &&           // not a number
          !v.match(/^https?:\/\//) &&    // not a URL
          !v.match(/^\d+h\s*\d+m$/) &&  // not a duration
          !v.includes('/')               // not a path
        );
        if (filtered.length > 0) return filtered;
      }

      // Strategy 2: Scan all text inputs, filter to likely names
      // Guest names: contain a space, no numbers at start, no URL patterns
      document.querySelectorAll('input').forEach(inp => {
        const val = inp.value.trim();
        if (!val || val.length < 4) return;
        // Skip number inputs, date inputs, URL-like inputs
        if (inp.type === 'number' || inp.type === 'date') return;
        if (val.match(/^\d{4}/)) return;         // date-like
        if (val.match(/^\d+$/)) return;           // pure number
        if (val.match(/^https?:\/\//)) return;    // URL
        if (val.match(/^\d+h\s*\d*m?$/)) return;  // duration
        if (val.includes('/')) return;             // path
        // Likely a name if it has a space and looks like text
        if (val.includes(' ') && val.match(/^[A-Za-z]/)) {
          guests.push(val);
        }
      });

      return guests;
    }

    // ---- Floating Toolbar ----
    let toolbar = null;
    let lastUrl = '';

    function isOnEpisodeEditor() {
      // Detect if we're on an episode editing page
      // Sveltia CMS uses hash routing: #/collections/episodes/entries/...
      // or #/collections/episodes/new
      const hash = window.location.hash;
      return hash.includes('collections/episodes/entries') ||
             hash.includes('collections/episodes/new');
    }

    function createToolbar() {
      if (toolbar) return;
      toolbar = document.createElement('div');
      toolbar.className = 'hmd-toolbar';

      const label = document.createElement('span');
      label.className = 'hmd-toolbar-label';
      label.textContent = 'Episode Tools:';
      toolbar.appendChild(label);

      // Next Episode # button
      const epBtn = document.createElement('button');
      epBtn.className = 'hmd-toolbar-btn';
      epBtn.textContent = '# Next: ' + getNextEpisodeNum();
      epBtn.title = 'Set episode number to the next available number';
      epBtn.onclick = function() {
        const nextNum = getNextEpisodeNum();
        const labelEl = findFieldByLabel('Episode Number');
        if (labelEl) {
          const input = findInputNear(labelEl);
          if (input) {
            const setter = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
            setter.call(input, nextNum);
            input.dispatchEvent(new Event('input', { bubbles: true }));
            input.dispatchEvent(new Event('change', { bubbles: true }));
            epBtn.textContent = '# Set to ' + nextNum + ' ✓';
            epBtn.classList.add('success');
            setTimeout(() => {
              epBtn.textContent = '# Next: ' + getNextEpisodeNum();
              epBtn.classList.remove('success');
            }, 2000);
            return;
          }
        }
        // Fallback: try any number input on the page
        const numInput = document.querySelector('input[type="number"]');
        if (numInput) {
          const setter = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
          setter.call(numInput, nextNum);
          numInput.dispatchEvent(new Event('input', { bubbles: true }));
          numInput.dispatchEvent(new Event('change', { bubbles: true }));
          epBtn.textContent = '# Set to ' + nextNum + ' ✓';
          epBtn.classList.add('success');
          setTimeout(() => {
            epBtn.textContent = '# Next: ' + getNextEpisodeNum();
            epBtn.classList.remove('success');
          }, 2000);
        } else {
          epBtn.textContent = 'Field not found';
          setTimeout(() => { epBtn.textContent = '# Next: ' + getNextEpisodeNum(); }, 2000);
        }
      };
      toolbar.appendChild(epBtn);

      // Check Guest Photos button
      const photoBtn = document.createElement('button');
      photoBtn.className = 'hmd-toolbar-btn';
      photoBtn.textContent = 'Check Guest Photos';
      photoBtn.title = 'Check if all listed guests have photos';
      photoBtn.onclick = function() {
        const guests = getGuestNamesFromForm();
        if (guests.length === 0) {
          alert('No guest names found. Enter guest names in the Guests field first.');
          return;
        }
        showPhotoCheckPopup(guests);
      };
      toolbar.appendChild(photoBtn);

      // Fill Guest Paths button
      const fillBtn = document.createElement('button');
      fillBtn.className = 'hmd-toolbar-btn';
      fillBtn.textContent = 'Fill Guest Paths';
      fillBtn.title = 'Auto-fill Guest Photo Paths from guest names';
      fillBtn.onclick = function() {
        const guests = getGuestNamesFromForm();
        if (guests.length === 0) {
          alert('No guest names found. Enter guest names in the Guests field first.');
          return;
        }
        const paths = [];
        for (const guest of guests) {
          const key = normalizeGuestKey(guest);
          const photo = guestLookup[key];
          if (photo) paths.push(photo.replace(/^\//, ''));
        }
        if (paths.length === 0) {
          alert('No matching photos found for any guest.');
          return;
        }
        // Find Guest Photo Paths list inputs and fill them
        const pathLabel = findFieldByLabel('Guest Photo Paths');
        if (pathLabel) {
          const pathInputs = findAllInputsNear(pathLabel);
          for (let i = 0; i < Math.min(paths.length, pathInputs.length); i++) {
            const setter = Object.getOwnPropertyDescriptor(HTMLInputElement.prototype, 'value').set;
            setter.call(pathInputs[i], paths[i]);
            pathInputs[i].dispatchEvent(new Event('input', { bubbles: true }));
            pathInputs[i].dispatchEvent(new Event('change', { bubbles: true }));
          }
        }
        fillBtn.textContent = paths.length + ' path(s) ready ✓';
        fillBtn.classList.add('success');
        setTimeout(() => {
          fillBtn.textContent = 'Fill Guest Paths';
          fillBtn.classList.remove('success');
        }, 2000);
      };
      toolbar.appendChild(fillBtn);

      document.body.appendChild(toolbar);
    }

    function removeToolbar() {
      if (toolbar) {
        toolbar.remove();
        toolbar = null;
      }
    }

    function showPhotoCheckPopup(guests) {
      const overlay = document.createElement('div');
      overlay.className = 'hmd-overlay';
      const popup = document.createElement('div');
      popup.className = 'hmd-popup';
      popup.innerHTML = '<button class="hmd-popup-close">&times;</button><h3>Guest Photo Check</h3>';

      for (const guest of guests) {
        const key = normalizeGuestKey(guest);
        const photo = guestLookup[key];
        const row = document.createElement('div');
        row.className = 'hmd-guest-row ' + (photo ? 'found' : 'missing');
        if (photo) {
          row.innerHTML = '<img src="' + photo + '" alt=""> <span><strong>' +
            guest + '</strong> — Photo found</span>';
        } else {
          row.innerHTML = '<span class="hmd-no-photo">✕</span> <span><strong>' +
            guest + '</strong> — No photo on file</span>';
        }
        popup.appendChild(row);
      }

      function close() { overlay.remove(); popup.remove(); }
      overlay.onclick = close;
      popup.querySelector('.hmd-popup-close').onclick = close;
      document.addEventListener('keydown', function esc(e) {
        if (e.key === 'Escape') { close(); document.removeEventListener('keydown', esc); }
      });
      document.body.appendChild(overlay);
      document.body.appendChild(popup);
    }

    // Poll for route changes to show/hide toolbar
    setInterval(() => {
      const url = window.location.hash;
      if (url !== lastUrl) {
        lastUrl = url;
        if (isOnEpisodeEditor()) {
          // Small delay to let the form render
          setTimeout(createToolbar, 500);
        } else {
          removeToolbar();
        }
      }
    }, 300);

    // ---- preSave hook ----
    function registerHooks() {
      if (typeof CMS === 'undefined') {
        setTimeout(registerHooks, 200);
        return;
      }

      CMS.registerEventListener({
        name: 'preSave',
        handler: ({ entry }) => {
          try {
            const collection = entry.get ? entry.get('collection') : entry.collection;
            if (collection !== 'episodes') return;

            let data, setData;
            if (entry.get && entry.getIn) {
              data = {
                num: entry.getIn(['data', 'num']),
                guests: entry.getIn(['data', 'guests']),
              };
              setData = (field, value) => {
                entry = entry.setIn(['data', field], value);
              };
            } else {
              data = {
                num: entry.data?.num,
                guests: entry.data?.guests,
              };
              setData = (field, value) => {
                entry.data[field] = value;
              };
            }

            const num = data.num;
            if (!num || num === 0) {
              const nextNum = getNextEpisodeNum();
              setData('num', nextNum);
              episodeNums.push(nextNum);
            }

            let guests = data.guests;
            if (guests) {
              if (guests.toJS) guests = guests.toJS();
              const missingPhotos = [];
              const guestImages = [];

              for (const guest of guests) {
                const key = normalizeGuestKey(guest);
                const photo = guestLookup[key];
                if (photo) {
                  guestImages.push(photo.replace(/^\//, ''));
                } else {
                  missingPhotos.push(guest);
                }
              }

              if (missingPhotos.length > 0) {
                const proceed = window.confirm(
                  'No photo found for: ' + missingPhotos.join(', ') +
                  '\n\nSave anyway?'
                );
                if (!proceed) return false;
              }

              if (guestImages.length > 0) {
                setData('guestImages', guestImages);
              }
            }

            return entry;
          } catch (err) {
            console.error('CMS preSave hook error:', err);
          }
        }
      });
    }

    registerHooks();
  </script>
  <script src="https://unpkg.com/@sveltia/cms/dist/sveltia-cms.js"></script>
</body>
</html>
