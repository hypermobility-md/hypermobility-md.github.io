<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Content Manager — Hypermobility MD</title>
  <style>
    /* Pre-save dialog */
    .hmd-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 9999;
    }
    .hmd-dialog {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: #1e1e2e;
      color: #e0e0e0;
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      padding: 28px;
      z-index: 10000;
      max-width: 500px;
      width: 92%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      max-height: 80vh;
      overflow-y: auto;
    }
    .hmd-dialog h3 {
      margin: 0 0 6px;
      font-size: 16px;
      color: #fff;
    }
    .hmd-dialog-subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }
    .hmd-section-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #6b5ce7;
      margin: 18px 0 8px;
    }
    .hmd-section-label:first-of-type { margin-top: 0; }
    .hmd-info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      margin: 4px 0;
      border-radius: 8px;
      font-size: 13px;
      background: #ffffff08;
      border: 1px solid #ffffff10;
    }
    .hmd-info-row img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #6b5ce7;
      flex-shrink: 0;
    }
    .hmd-info-row.found { background: #1b5e2018; border-color: #2e7d3230; }
    .hmd-info-row.missing { background: #b7131318; border-color: #c6282830; }
    .hmd-info-row .status { font-size: 12px; color: #888; }
    .hmd-info-row .status.ok { color: #81c784; }
    .hmd-info-row .status.warn { color: #ef9a9a; }
    .hmd-no-photo {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #c62828;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 18px;
      flex-shrink: 0;
    }
    .hmd-pending {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #2e7d32;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 20px;
      flex-shrink: 0;
      border: 2px solid #6b5ce7;
    }
    .hmd-path-item {
      font-size: 12px;
      color: #aaa;
      padding: 4px 12px;
      background: #ffffff06;
      border-radius: 6px;
      margin: 3px 0;
      font-family: 'SF Mono', Monaco, monospace;
      word-break: break-all;
    }
    .hmd-dialog-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
      justify-content: flex-end;
    }
    .hmd-btn {
      padding: 8px 20px;
      font-size: 13px;
      font-weight: 600;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      transition: background 0.15s;
    }
    .hmd-btn-save {
      background: #6b5ce7;
      color: white;
    }
    .hmd-btn-save:hover { background: #7c6ef0; }
    .hmd-btn-save.has-warnings {
      background: #e65100;
    }
    .hmd-btn-save.has-warnings:hover { background: #f57c00; }
    .hmd-btn-cancel {
      background: #333;
      color: #ccc;
      border: 1px solid #555;
    }
    .hmd-btn-cancel:hover { background: #444; }
    .hmd-warning {
      background: #e6510018;
      border: 1px solid #e6510040;
      border-radius: 8px;
      padding: 10px 14px;
      margin-top: 14px;
      font-size: 12px;
      color: #ffab91;
    }
  </style>
</head>
<body>
  <script>
    // =========================================================
    //  Hypermobility MD — CMS Enhancements for Sveltia CMS
    //  - Pre-save dialog with guest photo info & auto-fill
    //  - Floating toolbar with "Next Ep #" for quick fill
    //  - preSave hook for auto-increment, validation, guestImages
    // =========================================================

    let episodeNums = [];
    let guestLastEpisode = {};
    Promise.all([
      fetch('/cms-data/episode-nums.json').then(r => r.ok ? r.json() : []).catch(() => []),
      fetch('/cms-data/guest-last-episode.json').then(r => r.ok ? r.json() : {}).catch(() => ({}))
    ]).then(([nums, lastEp]) => {
      episodeNums = nums.filter(n => n !== null);
      guestLastEpisode = lastEp;
    });

    function getNextEpisodeNum() {
      if (episodeNums.length === 0) return 1;
      return Math.max(...episodeNums) + 1;
    }

    function stripCredentials(name) {
      let n = name, prev;
      do {
        prev = n;
        n = n.replace(/[,\s]+(M\.?D\.?|Ph\.?D\.?|D\.?P\.?T\.?|D\.?O\.?|P\.?A\.?-?C?|R\.?D\.?N\.?|O\.?T\.?|P\.?T\.?|J\.?D\.?|LICSW|NCPT|ATC|MS|MA|MPT|DMSC|MRCPsych|DDS)\.?\s*$/i, '');
      } while (n !== prev);
      return n.replace(/[,.\s]+$/, '').trim();
    }

    function normalizeGuestKey(name) {
      let n = name.replace(/^(Dr\.?|Prof\.?|Professor)\s+/i, '');
      n = stripCredentials(n).trim();
      // Drop a single-letter middle initial so e.g. "Brayden P. Yellman"
      // matches a "brayden yellman" profile key. Keeps first & last tokens.
      const parts = n.split(/\s+/);
      if (parts.length > 2) {
        n = parts.filter((p, i) => i === 0 || i === parts.length - 1 || !/^[A-Za-z]\.?$/.test(p)).join(' ');
      }
      return n.toLowerCase().replace(/\s+/g, ' ');
    }

    // Normalize an image path to absolute /Guests/Filename.ext
    function normalizeImagePath(p) {
      if (!p) return p;
      if (!p.startsWith('/')) p = '/' + p;
      if (!p.startsWith('/Guests/')) {
        const parts = p.split('/');
        p = '/Guests/' + parts[parts.length - 1];
      }
      return p;
    }

    // Extract a normalized guest key from an uploaded filename.
    // Any run of non-alphanumerics collapses to a single space, then lowercase.
    // e.g. "/Guests/Jane-Doe.jpg" → "jane doe"
    //      "Jane_Doe.JPG"        → "jane doe"
    //      "jane DOE.png"        → "jane doe"
    //      "Jane.Doe.png"        → "jane doe"
    //      "IMG_1234.jpg"        → "img 1234"
    function keyFromFilename(path) {
      if (!path) return '';
      const file = path.split('/').pop() || '';
      const stem = file.replace(/\.[^.]+$/, '');
      return stem.replace(/[^a-zA-Z0-9]+/g, ' ').toLowerCase().trim().replace(/\s+/g, ' ');
    }

    // ---- Pre-save dialog ----
    // Confirms the auto-assigned episode number and date before saving. Guest
    // photos are managed on the Guest Profile, not here, so they're no longer
    // part of this review.
    function showPreSaveDialog(info) {
      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'hmd-overlay';
        const dialog = document.createElement('div');
        dialog.className = 'hmd-dialog';

        let html = '<h3>Episode Pre-Save Review</h3>';
        html += '<div class="hmd-dialog-subtitle">Review the information below before saving.</div>';

        // Episode number
        html += '<div class="hmd-section-label">Episode Number</div>';
        html += '<div class="hmd-info-row"><span>';
        if (info.isBonus) {
          html += '<strong>Bonus / Unnumbered</strong> <span class="status ok">(no number assigned)</span>';
        } else if (info.numAutoFilled) {
          html += '<strong>#' + info.num + '</strong> <span class="status ok">(auto-assigned)</span>';
        } else {
          html += '<strong>#' + info.num + '</strong>';
        }
        html += '</span></div>';

        // Date
        html += '<div class="hmd-section-label">Date</div>';
        html += '<div class="hmd-info-row"><span>';
        if (info.dateAutoFilled) {
          html += '<strong>' + info.date + '</strong> <span class="status ok">(auto-filled to today)</span>';
        } else {
          html += '<strong>' + info.date + '</strong>';
        }
        html += '</span></div>';

        // Reminder: guests are listed by name; photos/bios come from profiles.
        if (info.guests && info.guests.length > 0) {
          html += '<div class="hmd-section-label">Guests</div>';
          html += '<div class="hmd-info-row"><span>' + info.guests.join(', ') + '</span></div>';
          html += '<div class="hmd-warning" style="background:#6b5ce718;border-color:#6b5ce740;color:#b9b0f5;">' +
            'Photos &amp; bios are managed on each <strong>Guest Profile</strong>. New guests get a profile automatically; ' +
            'open it to add a photo, bio, and links.</div>';
        }

        // Action buttons
        html += '<div class="hmd-dialog-actions">';
        html += '<button class="hmd-btn hmd-btn-cancel" id="hmdCancel">Cancel</button>';
        html += '<button class="hmd-btn hmd-btn-save" id="hmdSave">Save</button>';
        html += '</div>';

        dialog.innerHTML = html;

        function close(result) {
          overlay.remove();
          dialog.remove();
          document.removeEventListener('keydown', escHandler);
          resolve(result);
        }

        function escHandler(e) {
          if (e.key === 'Escape') close(false);
        }

        document.body.appendChild(overlay);
        document.body.appendChild(dialog);
        document.addEventListener('keydown', escHandler);

        dialog.querySelector('#hmdCancel').onclick = () => close(false);
        dialog.querySelector('#hmdSave').onclick = () => close(true);
        overlay.onclick = () => close(false);
      });
    }

    // ---- Appearance image-missing / -mismatched warning ----
    function showAppearanceImageWarning(info) {
      // Back-compat: callers used to pass just the show name string.
      if (typeof info === 'string') info = { showName: info, missing: true };
      const showName = info.showName || '(unnamed show)';

      return new Promise((resolve) => {
        const overlay = document.createElement('div');
        overlay.className = 'hmd-overlay';
        const dialog = document.createElement('div');
        dialog.className = 'hmd-dialog';

        let html = '<h3>Appearance Pre-Save Review</h3>';
        html += '<div class="hmd-dialog-subtitle">Review the information below before saving.</div>';
        html += '<div class="hmd-section-label">Show Image</div>';

        if (info.missing) {
          html += '<div class="hmd-info-row missing">';
          html += '<span class="hmd-no-photo">✕</span>';
          html += '<span><strong>' + showName + '</strong><br><span class="status warn">No show image set</span></span>';
          html += '</div>';
          html += '<div class="hmd-warning">⚠ No show image was uploaded or selected. The appearance card will render without artwork. Add a Show Image to make the card look complete.</div>';
        } else if (info.mismatchedFilename) {
          html += '<div class="hmd-info-row missing">';
          html += '<span class="hmd-no-photo">!</span>';
          html += '<span><strong>' + showName + '</strong><br><span class="status warn">Filename doesn\'t match the show</span></span>';
          html += '</div>';
          html += '<div class="hmd-warning">⚠ The uploaded file <strong>' + info.mismatchedFilename +
            '</strong> doesn\'t look related to <strong>' + showName + '</strong>. ' +
            'Rename it to something like <code>' + (info.expectedPrefix || 'show-name') + '.webp</code> so future edits stay tidy. ' +
            'Saving will still work — the filename is just a label.</div>';
        }

        html += '<div class="hmd-dialog-actions">';
        html += '<button class="hmd-btn hmd-btn-cancel" id="hmdCancel">Go Back</button>';
        html += '<button class="hmd-btn hmd-btn-save has-warnings" id="hmdSave">Save Anyway</button>';
        html += '</div>';

        dialog.innerHTML = html;

        function close(result) {
          overlay.remove();
          dialog.remove();
          document.removeEventListener('keydown', escHandler);
          resolve(result);
        }
        function escHandler(e) { if (e.key === 'Escape') close(false); }

        document.body.appendChild(overlay);
        document.body.appendChild(dialog);
        document.addEventListener('keydown', escHandler);
        dialog.querySelector('#hmdCancel').onclick = () => close(false);
        dialog.querySelector('#hmdSave').onclick = () => close(true);
        overlay.onclick = () => close(false);
      });
    }

    // ---- preSave hook ----
    function registerHooks() {
      if (typeof CMS === 'undefined') {
        setTimeout(registerHooks, 200);
        return;
      }

      CMS.registerEventListener({
        name: 'preSave',
        handler: async ({ entry }) => {
          try {
            const collection = entry.get ? entry.get('collection') : entry.collection;

            // Read entry data (handle both Immutable.js and plain object)
            let getData, setData;
            if (entry.get && entry.getIn) {
              getData = (field) => {
                const val = entry.getIn(['data', field]);
                return val && val.toJS ? val.toJS() : val;
              };
              setData = (field, value) => {
                entry = entry.setIn(['data', field], value);
              };
            } else {
              getData = (field) => entry.data?.[field];
              setData = (field, value) => { entry.data[field] = value; };
            }

            // --- Appearances: warn if show image is missing or mislabeled ---
            if (collection === 'appearances') {
              const imageUrl = getData('imageUrl');
              const showName = getData('showName') || '(unnamed show)';
              const slug = (showName || '')
                .toLowerCase()
                .replace(/[^a-z0-9]+/g, '-')
                .replace(/^-+|-+$/g, '');
              const fileKey = keyFromFilename(imageUrl).replace(/\s+/g, '-');
              // Heuristic: filename should overlap the show slug somehow.
              // Either the slug appears in the filename or vice versa.
              const filenameMismatch = imageUrl && slug && fileKey &&
                !fileKey.includes(slug) && !slug.includes(fileKey);
              if (!imageUrl || filenameMismatch) {
                const proceed = await showAppearanceImageWarning({
                  showName,
                  missing: !imageUrl,
                  mismatchedFilename: filenameMismatch ? (imageUrl.split('/').pop() || '') : null,
                  expectedPrefix: slug
                });
                if (!proceed) {
                  throw new Error('Save cancelled — show image issue.');
                }
              }
              return entry;
            }

            // --- Guest Profile: auto-link uploaded image ---
            if (collection === 'guest-profiles') {
              const image = getData('image');
              const key = getData('key');
              if (image && key) {
                // If the image was uploaded via the CMS, it will be a path like /Guests/filename.jpg
                // Ensure guestImages.json gets updated by storing the image path
                // The image field already stores the path, so we just need to make sure it's correct
                let imagePath = image;
                if (!imagePath.startsWith('/')) {
                  imagePath = '/' + imagePath;
                }
                if (!imagePath.startsWith('/Guests/')) {
                  // Extract filename and prepend /Guests/
                  const parts = imagePath.split('/');
                  imagePath = '/Guests/' + parts[parts.length - 1];
                }
                setData('image', imagePath);
              }
              // Stamp lastEpisode from the build-time guest→episode-date map so
              // a newly-added guest sorts by recency immediately, without
              // waiting for the 6-hourly sync backfill.
              if (key) {
                const last = guestLastEpisode[normalizeGuestKey(String(key))];
                if (last) setData('lastEpisode', last);
              }
              return entry;
            }

            // --- Episodes: auto-fill num, date, guest images ---
            if (collection !== 'episodes') return;

            // Bonus episodes opt out of auto-numbering.
            const isBonus = getData('bonus') === true;

            // Prepare info for the pre-save dialog
            let num = getData('num');
            let numAutoFilled = false;
            if (isBonus) {
              num = null;
            } else if (!num || num === 0) {
              num = getNextEpisodeNum();
              numAutoFilled = true;
            }

            let date = getData('date');
            let dateAutoFilled = false;
            if (!date) {
              date = new Date().toISOString().split('T')[0];
              dateAutoFilled = true;
            }

            // Guests are listed by name only. Photos and bios live on each
            // Guest Profile (the site renders a guest's photo from their
            // profile), so the episode no longer matches or stores images.
            const guests = getData('guests') || [];

            // Show the pre-save dialog — confirms number + date.
            const proceed = await showPreSaveDialog({
              num,
              numAutoFilled,
              isBonus,
              date,
              dateAutoFilled,
              guests
            });

            // Throw to actually abort the save — returning false isn't honored
            // by Sveltia's preSave hook, so click-away / Cancel must raise.
            if (!proceed) {
              throw new Error('Save cancelled by user.');
            }

            // Apply changes
            if (isBonus) {
              setData('num', null);
            } else if (numAutoFilled) {
              setData('num', num);
              episodeNums.push(num);
            }

            if (dateAutoFilled) {
              setData('date', date);
            }

            return entry;
          } catch (err) {
            // Re-throw cancellations so the CMS actually aborts the save.
            // Swallowing the error (the old behavior) caused Cancel / click-away
            // to silently fall through and save anyway.
            if (err && /cancelled/i.test(err.message || '')) throw err;
            console.error('CMS preSave hook error:', err);
            throw err;
          }
        }
      });
    }

    registerHooks();
  </script>
  <!-- Pinned to a specific version. Loading `latest` from unpkg let the CMS
       client update on its own and desync from the auth worker's OAuth
       protocol (caused "Authentication aborted"). Bump this deliberately. -->
  <script src="https://unpkg.com/@sveltia/cms@0.169.1/dist/sveltia-cms.js"></script>
</body>
</html>
